<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SPS 规则引擎管理平台 - 执行规则</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.7.6/dist/css/layui.css">
    <style>
        body { margin: 0; background: #fff; font-size: 14px; color: #333; }
        .layout { display: flex; min-height: 100vh; }
        .side { width: 200px; background: #252525; color: #fff; }
        .logo { height: 52px; line-height: 52px; padding-left: 20px; background: #2f6699; font-size: 18px; font-weight: bold; }
        .menu-title { padding: 16px 20px; font-weight: bold; background: #303030; }
        .menu-item { padding: 13px 20px; color: #fff; }
        .menu-item.active { background: #1abc9c; }
        .main { flex: 1; }
        .topbar { height: 52px; background: #2f6699; }
        .content { display: flex; padding: 24px 30px; gap: 24px; }
        .left-panel { width: 520px; border: 1px solid #f0f0f0; padding: 20px 24px; }
        .right-panel { flex: 1; border-left: 1px solid #eee; padding-left: 24px; overflow-x: auto; }
        .form-row { display: flex; align-items: center; margin-bottom: 18px; }
        .form-row label { width: 90px; text-align: right; margin-right: 16px; }
        .form-row select { width: 320px; height: 32px; }
        .file-name { margin-left: 12px; color: #888; }
        .execute-msg { margin-left: 12px; color: red; }
        .summary { padding: 12px 14px; background: #eefaf0; margin-bottom: 14px; line-height: 26px; }
        .summary b { margin-right: 14px; }
        .result-title { font-size: 16px; font-weight: bold; margin: 10px 0 10px; }
    </style>
</head>
<body>
<div class="layout">
    <div class="side">
        <div class="logo">SPS 规则引擎</div>
        <div class="menu-title">脚本管理</div>
        <div class="menu-item">脚本列表</div>
        <div class="menu-item">上传 SPS</div>
        <div class="menu-item">规则片段</div>
        <div class="menu-item active">执行规则</div>
    </div>

    <div class="main">
        <div class="topbar"></div>
        <div class="content">
            <div class="left-panel">
                <div style="margin-bottom: 22px; font-size: 15px;">执行规则</div>

                <div class="form-row">
                    <label>选择脚本</label>
                    <select id="scriptId">
                        <option value="">请选择脚本</option>
                    </select>
                </div>

                <div class="form-row">
                    <label>tableId</label>
                    <input class="layui-input" id="tableId" style="width: 320px;">
                </div>

                <div class="form-row">
                    <label>projectId</label>
                    <input class="layui-input" id="projectId" style="width: 320px;">
                </div>

                <div class="form-row">
                    <label>year</label>
                    <input class="layui-input" id="year" style="width: 320px;">
                </div>

                <div class="form-row">
                    <label>CSV 数据</label>
                    <button type="button" class="layui-btn layui-btn-sm" id="chooseCsv">选择 CSV</button>
                    <span class="file-name" id="csvName">未选择</span>
                </div>

                <div class="form-row">
                    <label>映射文件</label>
                    <button type="button" class="layui-btn layui-btn-primary layui-btn-sm" id="chooseMapping">选择</button>
                    <span class="file-name" id="mappingName">可选，JSON/SQL</span>
                </div>

                <div class="form-row">
                    <label>学生信息</label>
                    <button type="button" class="layui-btn layui-btn-primary layui-btn-sm" id="chooseStudent">选择</button>
                    <span class="file-name" id="studentName">可选，证件类型/号码 JSON</span>
                </div>

                <div class="form-row">
                    <label>字段校验</label>
                    <input type="checkbox" id="fieldCheck">
                </div>

                <button class="layui-btn" id="executeBtn">执行</button>
                <span class="execute-msg" id="executeMsg"></span>
            </div>

            <div class="right-panel">
                <div style="margin-bottom: 20px; font-size: 15px;">执行结果</div>
                <div id="summary" class="summary" style="display:none;"></div>
                <div class="result-title">学生规则结果</div>
                <table id="resultTable" lay-filter="resultTable"></table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/layui@2.7.6/dist/layui.js"></script>
<script>
layui.use(['upload', 'table'], function () {
    var upload = layui.upload;
    var table = layui.table;
    var csvFile = null;
    var mappingFile = null;
    var studentFile = null;

    loadScripts();

    upload.render({
        elem: '#chooseCsv',
        auto: false,
        accept: 'file',
        exts: 'csv',
        choose: function (obj) {
            obj.preview(function(index, file) {
                csvFile = file;
                $('#csvName').text(file.name);
            });
        }
    });

    upload.render({
        elem: '#chooseMapping',
        auto: false,
        accept: 'file',
        choose: function (obj) {
            obj.preview(function(index, file) {
                mappingFile = file;
                $('#mappingName').text(file.name);
            });
        }
    });

    upload.render({
        elem: '#chooseStudent',
        auto: false,
        accept: 'file',
        choose: function (obj) {
            obj.preview(function(index, file) {
                studentFile = file;
                $('#studentName').text(file.name);
            });
        }
    });

    $('#executeBtn').on('click', function () {
        $('#executeMsg').text('');
        if (!csvFile) {
            $('#executeMsg').text('请先选择 CSV 数据文件');
            return;
        }

        var formData = new FormData();
        formData.append('scriptId', $('#scriptId').val());
        formData.append('tableId', $('#tableId').val());
        formData.append('projectId', $('#projectId').val());
        formData.append('year', $('#year').val());
        formData.append('fieldCheck', $('#fieldCheck').is(':checked') ? '1' : '0');
        formData.append('csvFile', csvFile);
        if (mappingFile) formData.append('mappingFile', mappingFile);
        if (studentFile) formData.append('studentFile', studentFile);

        $.ajax({
            url: '/api/v2/rules/execute',
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            success: function (res) {
                if (res.code !== 0 && res.code !== 200) {
                    $('#executeMsg').text(res.msg || '执行失败');
                    return;
                }
                renderRuleResult(res.data || {});
            },
            error: function (xhr) {
                $('#executeMsg').text('执行规则请求失败：' + xhr.status);
            }
        });
    });

    function renderRuleResult(data) {
        var rows = data.students || [];
        $('#summary').show().html(
            '<b>学生数：</b>' + (data.studentCount || rows.length) +
            '<b>规则数：</b>' + (data.ruleCount || 0) +
            '<b>全部通过学生：</b>' + (data.passedStudentCount || 0) +
            '<b>存在未通过学生：</b>' + (data.failedStudentCount || 0)
        );

        table.render({
            elem: '#resultTable',
            data: rows,
            page: true,
            limit: 20,
            limits: [20, 50, 100, 200],
            text: {none: '暂无执行结果'},
            cols: [[
                {field: 'studentId', title: '学生ID', width: 170, templet: function (d) {
                    return escapeHtml(d.studentId || d.studentKey || '');
                }},
                {field: 'studentName', title: '姓名', width: 120, templet: function (d) {
                    return escapeHtml(d.studentName || '');
                }},
                {field: 'passedText', title: '通过', minWidth: 220, templet: multilineCell('passedText')},
                {field: 'failedText', title: '未通过', minWidth: 420, templet: multilineCell('failedText')}
            ]]
        });
    }

    function loadScripts() {
        $.getJSON('/api/scripts', function (scripts) {
            var select = $('#scriptId');
            select.empty().append('<option value="">请选择脚本</option>');
            (scripts || []).forEach(function (script) {
                select.append(
                    '<option value="' + escapeHtml(script.id) + '">#' +
                    escapeHtml(script.id) + ' ' + escapeHtml(script.name || '') +
                    '</option>'
                );
            });
        });
    }

    function multilineCell(field) {
        return function (d) {
            return '<div style="white-space: pre-line; line-height: 22px;">' + escapeHtml(d[field] || '') + '</div>';
        };
    }

    function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
});
</script>
</body>
</html>
