<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SPSS规则执行结果</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <style>
        body { padding: 16px; }
        .summary-box { margin-bottom: 12px; }
        .summary-box .layui-badge { margin-right: 12px; }
        .block-title { margin: 18px 0 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="layui-card">
    <div class="layui-card-header">执行规则</div>
    <div class="layui-card-body">
        <div class="layui-form" lay-filter="executeForm">
            <div class="layui-form-item">
                <label class="layui-form-label">项目ID</label>
                <div class="layui-input-inline">
                    <input type="text" name="projectId" class="layui-input" placeholder="projectId">
                </div>
                <label class="layui-form-label">表ID</label>
                <div class="layui-input-inline">
                    <input type="text" name="tableId" class="layui-input" placeholder="tableId">
                </div>
                <label class="layui-form-label">年份</label>
                <div class="layui-input-inline">
                    <input type="text" name="year" class="layui-input" placeholder="year">
                </div>
                <button class="layui-btn" id="btnExecute">执行校验</button>
            </div>
        </div>
    </div>
</div>

<div class="summary-box">
    <span class="layui-badge layui-bg-blue" id="totalCount">总数：0</span>
    <span class="layui-badge layui-bg-green" id="passedCount">通过：0</span>
    <span class="layui-badge" id="failedCount">未通过：0</span>
</div>

<div class="block-title">通过学生</div>
<table id="passedTable" lay-filter="passedTable"></table>

<div class="block-title">未通过学生</div>
<table id="failedTable" lay-filter="failedTable"></table>

<script src="/jquery.min.js"></script>
<script src="/layui/layui.js"></script>
<script>
layui.use(['table', 'form'], function () {
    var table = layui.table;
    var form = layui.form;

    table.render({
        elem: '#passedTable',
        data: [],
        page: true,
        cols: [[
            {type: 'numbers', title: '序号', width: 80},
            {field: 'studentId', title: '学生ID', width: 160},
            {field: 'studentName', title: '姓名', width: 160}
        ]]
    });

    table.render({
        elem: '#failedTable',
        data: [],
        page: true,
        cols: [[
            {type: 'numbers', title: '序号', width: 80},
            {field: 'studentId', title: '学生ID', width: 160},
            {field: 'studentName', title: '姓名', width: 160},
            {field: 'ruleNames', title: '违反规则', minWidth: 260},
            {field: 'messages', title: '原因说明', minWidth: 500}
        ]]
    });

    $('#btnExecute').on('click', function () {
        var values = form.val('executeForm');

        $.ajax({
            url: '/api/v2/rules/execute/doctor-answer',
            type: 'POST',
            contentType: 'application/json;charset=UTF-8',
            data: JSON.stringify({
                projectId: values.projectId ? Number(values.projectId) : null,
                tableId: values.tableId ? Number(values.tableId) : null,
                year: values.year || null
            }),
            success: function (res) {
                if (res.code !== 0) {
                    layer.msg(res.msg || '执行失败');
                    return;
                }
                renderResult(res.data || {});
            },
            error: function () {
                layer.msg('请求失败');
            }
        });
    });

    function renderResult(data) {
        var passedList = data.passedList || [];
        var failedList = data.failedList || [];

        $('#totalCount').text('总数：' + (data.totalCount || 0));
        $('#passedCount').text('通过：' + (data.passedCount || passedList.length));
        $('#failedCount').text('未通过：' + (data.failedCount || failedList.length));

        table.reload('passedTable', {
            data: passedList,
            page: {curr: 1}
        });

        table.reload('failedTable', {
            data: failedList,
            page: {curr: 1}
        });
    }
});
</script>
</body>
</html>
