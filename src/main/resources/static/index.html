<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPS 规则引擎管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.8.0/dist/css/layui.css">
<style>
body{margin:0;font-size:14px}
.header{height:50px;background:#2B5E8E;color:#fff;line-height:50px;padding:0 20px;font-size:18px}
.side{position:fixed;top:50px;left:0;bottom:0;width:200px;background:#333;overflow-y:auto}
.side .layui-nav{background:none}
.side .layui-nav-item a{color:#ccc}
.side .layui-nav-itemed>a,.side .layui-nav-item a:hover{color:#fff}
.main{position:fixed;top:50px;left:200px;right:0;bottom:0;overflow-y:auto;padding:15px}
.tag{display:inline-block;padding:0 6px;border-radius:2px;font-size:12px;color:#fff;margin-right:4px}
.tag.COMPUTE{background:#5FB878}.tag.RECODE{background:#FF5722}
.tag.CONDITIONAL{background:#FFB800}.tag.IF_ASSIGN{background:#2B5E8E}
.tag.ROW_CHECK{background:#01AAED}.tag.DUPLICATE_MARK{background:#A020F0}
.tag.ERROR_GROUP{background:#FF5722}.tag.CLEAN_DATA{background:#5FB878}
/* V2 types */
.tag.COMPUTE_INTERMEDIATE{background:#5FB878}
.tag.IDENTITY_CHECK{background:#01AAED}
.tag.MISSING_CHECK{background:#FF8C00}
.tag.CONSISTENCY_CHECK{background:#2B5E8E}
.tag.RANGE_CHECK{background:#FF5722}
.tag.DOCUMENT_CHECK{background:#A020F0}
.tag.CONDITIONAL_BLOCK{background:#FFB800}
.tag.OUTPUT_GROUP{background:#999}
.tag.OUTCOME_DETERMINATION{background:#D9534F}
.step-card{margin:4px 0;padding:8px;background:#f8f8f8;border-left:3px solid #5FB878;border-radius:3px;font-size:13px}
.step-card.CONDITIONAL{border-left-color:#FFB800;background:#fffbf0}
.step-card.RECODE{border-left-color:#FF5722}
.step-card.IF_ASSIGN{border-left-color:#2B5E8E}
.toolbar{padding:8px 0}
.student-rule-result-table .layui-table-cell{height:auto;line-height:22px;white-space:normal;overflow:visible;text-overflow:clip}
.student-rule-result-table td{vertical-align:top}
.student-rule-lines{white-space:pre-line;line-height:22px;padding:4px 0}
.rule-source-question-table .layui-table-cell{height:auto;line-height:20px;white-space:normal;overflow:visible;text-overflow:clip}
.rule-source-question-lines{white-space:pre-line;line-height:20px;padding:3px 0}
pre{margin:0}
</style>
</head>
<body>

<div class="header">SPS 规则引擎管理平台</div>

<div class="side">
<ul class="layui-nav layui-nav-tree" lay-filter="side">
  <li class="layui-nav-item layui-nav-itemed">
    <a href="javascript:">脚本管理</a>
    <dl class="layui-nav-child">
      <dd><a href="javascript:" data-page="scripts">脚本列表</a></dd>
      <dd><a href="javascript:" data-page="upload">上传 SPS</a></dd>
      <dd><a href="javascript:" data-page="snippet">规则片段</a></dd>
      <dd><a href="javascript:" data-page="run">执行规则</a></dd>
    </dl>
  </li>
</ul>
</div>

<div class="main" id="mainContent"></div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/layui@2.8.0/dist/layui.js"></script>

<!-- ═══ Script List ═══ -->
<script type="text/html" id="tplScripts">
<div class="toolbar">
  <button class="layui-btn layui-btn-sm" onclick="loadScripts()"><i class="layui-icon layui-icon-refresh"></i> 刷新</button>
</div>
<table id="scriptTable" lay-filter="scriptTable"></table>
<script type="text/html" id="scriptBar">
  <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="rules">规则</a>
  <a class="layui-btn layui-btn-xs" lay-event="outputs">输出分组</a>
  <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="publish">{{d.status=='DRAFT'?'发布':'已发布'}}</a>
  <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
</script>
</script>

<!-- ═══ Upload ═══ -->
<script type="text/html" id="tplUpload">
<div class="layui-card">
  <div class="layui-card-header">上传 .sps 脚本文件</div>
  <div class="layui-card-body">
    <div class="layui-upload-drag" id="uploadBox">
      <i class="layui-icon layui-icon-upload" style="font-size:40px;color:#999"></i>
      <p>点击或将文件拖拽到这里上传</p>
    </div>
    <div id="uploadResult" style="margin-top:15px"></div>
  </div>
</div>
</script>

<!-- ═══ Rules List ═══ -->
<script type="text/html" id="tplRules">
<div class="toolbar">
  <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="showPage('scripts')">← 返回</button>
  <button class="layui-btn layui-btn-sm" onclick="syncSourceQuestionMappings()">同步question_id</button>
  <span style="margin-left:10px;font-size:16px;font-weight:bold" id="scriptTitle"></span>
</div>
<table id="ruleTable" lay-filter="ruleTable"></table>
<script type="text/html" id="ruleBar">
  <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="detail">详情</a>
  <a class="layui-btn layui-btn-xs" lay-event="editRule">规则编辑</a>
  <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="editCorrection">纠偏编辑</a>
</script>
</script>

<!-- ═══ Rule Detail ═══ -->
<script type="text/html" id="tplDetail">
<div class="toolbar">
  <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="showRules()">← 返回规则列表</button>
  <span style="margin-left:10px;font-size:16px;font-weight:bold" id="ruleTitle"></span>
</div>
<div class="layui-card">
  <div class="layui-card-header">基本信息</div>
  <div class="layui-card-body" id="ruleInfo"></div>
</div>
<div class="layui-card">
  <div class="layui-card-header">步骤列表 (<span id="stepCount">0</span>)</div>
  <div class="layui-card-body" id="stepList"></div>
</div>
<div class="layui-card">
  <div class="layui-card-header">SPSS 源码</div>
  <div class="layui-card-body"><pre id="spssSource" style="white-space:pre-wrap;max-height:300px;overflow:auto;background:#f5f5f5;padding:10px;font-size:12px"></pre></div>
</div>
<div class="layui-card">
  <div class="layui-card-header">Java 预览</div>
  <div class="layui-card-body"><pre id="javaPreview" style="white-space:pre-wrap;max-height:200px;overflow:auto;background:#f5f5f5;padding:10px;font-size:12px"></pre></div>
</div>
</script>

<!-- ═══ Output Rules ═══ -->
<script type="text/html" id="tplOutputs">
<div class="toolbar">
  <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="showRules()">← 返回</button>
  <span style="margin-left:10px;font-size:16px;font-weight:bold" id="outputTitle"></span>
</div>
<table id="outputTable"></table>
</script>

<!-- ═══ Snippet Editor ═══ -->
<script type="text/html" id="tplSnippet">
<div class="layui-row">
  <div class="layui-col-md7" style="padding-right:10px">
    <div class="layui-card">
      <div class="layui-card-header">SPSS 代码片段</div>
      <div class="layui-card-body">
        <div class="layui-form-item">
          <label class="layui-form-label" style="width:80px">脚本名称</label>
          <div class="layui-input-block" style="margin-left:110px">
            <input id="snippetName" class="layui-input" placeholder="新建脚本名称（留空则追加到已有脚本）">
          </div>
        </div>
        <div class="layui-form-item">
          <label class="layui-form-label" style="width:80px">追加到</label>
          <div class="layui-input-block" style="margin-left:110px">
            <select id="snippetScriptId" lay-search>
              <option value="">-- 新建脚本 --</option>
            </select>
          </div>
        </div>
        <div class="layui-form-item">
          <textarea id="snippetText" class="layui-textarea" rows="12" placeholder="在此粘贴 SPSS 语法片段，例如:
COMPUTE BMI=RND(Q7*10000/(Q6*Q6),0.1).
RECODE BMI (SYSMIS=1)(ELSE=0) INTO BMI异常或缺失."></textarea>
        </div>
        <button class="layui-btn layui-btn-normal" onclick="previewSnippet()">预览解析</button>
        <button class="layui-btn" onclick="saveSnippet()">保存</button>
        <span id="snippetResult" style="margin-left:10px"></span>
      </div>
    </div>
  </div>
  <div class="layui-col-md5">
    <div class="layui-card">
      <div class="layui-card-header">解析预览</div>
      <div class="layui-card-body" id="previewResult">
        <span style="color:#999">点击"预览解析"查看结果</span>
      </div>
    </div>
  </div>
</div>
</script>

<!-- ═══ Run Rules ═══ -->
<script type="text/html" id="tplRun">
<div class="layui-row">
  <div class="layui-col-md6" style="padding-right:10px">
    <div class="layui-card">
      <div class="layui-card-header">执行规则</div>
      <div class="layui-card-body layui-form" lay-filter="runForm">
        <div class="layui-form-item">
          <label class="layui-form-label" style="width:80px">选择脚本</label>
          <div class="layui-input-block" style="margin-left:110px">
            <select id="runScriptId" lay-search><option value="">-- 请选择 --</option></select>
          </div>
        </div>
        <div class="layui-form-item">
          <label class="layui-form-label" style="width:80px">项目/年份</label>
          <div class="layui-input-inline" style="width:150px">
            <input id="runProjectId" class="layui-input" value="2" placeholder="projectId">
          </div>
          <div class="layui-input-inline" style="width:120px">
            <input id="runYear" class="layui-input" value="2025" placeholder="year">
          </div>
        </div>
        <div class="layui-form-item">
          <label class="layui-form-label" style="width:80px">表/来源</label>
          <div class="layui-input-inline" style="width:150px">
            <select id="runTableId" lay-filter="runTableId">
              <option value="">-- 选择表 --</option>
              <option value="1">表1-1</option>
              <option value="2">表1-2</option>
              <option value="10">表1-3</option>
              <option value="3">表2-1</option>
              <option value="4">表2-2</option>
              <option value="5">表2-3</option>
              <option value="6">表3-1</option>
              <option value="7">表3-2</option>
              <option value="8">表3-3</option>
            </select>
          </div>
          <div class="layui-input-inline" style="width:150px">
            <select id="runSource">
              <option value="normal">普通数据</option>
              <option value="intervene">干预数据</option>
            </select>
          </div>
        </div>
        <div class="layui-form-item">
          <label class="layui-form-label" style="width:80px">地区</label>
          <div class="layui-input-inline" style="width:120px">
            <select id="runProvinceId" lay-filter="runProvinceId" lay-search><option value="">省</option></select>
          </div>
          <div class="layui-input-inline" style="width:120px">
            <select id="runCityId" lay-filter="runCityId" lay-search><option value="">市</option></select>
          </div>
          <div class="layui-input-inline" style="width:120px">
            <select id="runDivisionId" lay-filter="runDivisionId" lay-search><option value="">区县</option></select>
          </div>
        </div>
        <div class="layui-form-item" id="runSchoolRow">
          <label class="layui-form-label" style="width:80px">学校</label>
          <div class="layui-input-block" style="margin-left:110px">
            <select id="runSchoolId" lay-search><option value="">-- 请选择学校 --</option></select>
          </div>
        </div>
        <div class="layui-form-item">
          <label class="layui-form-label" style="width:80px">映射文件</label>
          <div class="layui-input-block" style="margin-left:110px">
            <button class="layui-btn layui-btn-sm layui-btn-primary" id="runMapBtn"><i class="layui-icon layui-icon-file"></i> 选择(可选)</button>
            <span id="runMapName" style="margin-left:8px;color:#999">JSON/SQL，用于变量映射</span>
          </div>
        </div>
        <div class="layui-form-item">
          <label class="layui-form-label" style="width:80px">学生信息</label>
          <div class="layui-input-block" style="margin-left:110px">
            <button class="layui-btn layui-btn-sm layui-btn-primary" id="runStuBtn"><i class="layui-icon layui-icon-file"></i> 选择(可选)</button>
            <span id="runStuName" style="margin-left:8px;color:#999">证件类型/号码JSON</span>

        <div class="layui-form-item">
          <label class="layui-form-label" style="width:80px">字段校验</label>

    </div>

  <div class="layui-col-md6">
    <div class="layui-card">
      <div class="layui-card-header">执行结果 <span id="runSummary"></span></div>
      <div class="layui-card-body" style="max-height:560px;overflow:auto">
        <div id="studentSplitSummary" style="display:none;margin-bottom:10px;padding:10px;border-left:4px solid #5FB878;background:#f8fffb"></div>
        <div id="passedStudentPanel" style="display:none;margin-bottom:14px">
          <h3 style="font-size:15px;margin:8px 0">通过学生</h3>
          <table id="passedStudentTable" lay-filter="passedStudentTable"></table>
        </div>
        <div id="failedStudentPanel" style="display:none;margin-bottom:14px">
          <h3 style="font-size:15px;margin:8px 0">未通过学生</h3>
          <table id="failedStudentTable" lay-filter="failedStudentTable"></table>

        <div id="runErrorDetail" style="margin-top:10px"></div>

  </div>
</div>
</script>

<!-- ═══ Init ═══ -->
<script>
var currentScriptId, currentScriptName, currentRuleId;
var table, element, upload, form, layer;

// V2 rule API: line-aware segmentation + rule type labels.
var RULE_API = '/api/v2/rules';

layui.use(['table','element','upload','form','layer'], function(){
  table = layui.table; element = layui.element;
  upload = layui.upload; form = layui.form; layer = layui.layer;

  showPage('scripts');

  // Side menu
  element.on('nav(side)', function(elem){
    var page = $(elem).attr('data-page') || elem.getAttribute('data-page');
    if(page) showPage(page);
  });

  // ── Script table events ──
  table.on('tool(scriptTable)', function(obj){
    currentScriptId = obj.data.id; currentScriptName = obj.data.name;
    if(obj.event=='rules') showRules();
    if(obj.event=='outputs') showOutputs();
    if(obj.event=='publish'){
      var s = obj.data.status=='DRAFT'?'PUBLISHED':'DRAFT';
      $.ajax({url:'/api/scripts/'+currentScriptId+'/status?status='+s, method:'PUT', success:function(){loadScripts()}});
    }
    if(obj.event=='del'){
      layer.confirm('确定删除脚本 '+obj.data.name+' 及其所有规则?', function(i){
        $.ajax({url:'/api/scripts/'+currentScriptId, method:'DELETE', success:function(){layer.close(i);loadScripts()}});
      });
    }
  });

  // ── Rule table events ──
  table.on('tool(ruleTable)', function(obj){
    currentRuleId = obj.data.id;
    if(obj.event=='detail') showDetail();
    if(obj.event=='edit') showEditForm(obj.data);
    if(obj.event=='editRule') showRuleEditForm(obj.data);
    if(obj.event=='editCorrection') showCorrectionEditForm(obj.data);
  });

});

// ═══ Page router ═══
function showPage(page){
  var tplMap = {scripts:'tplScripts',upload:'tplUpload',rules:'tplRules',detail:'tplDetail',outputs:'tplOutputs',snippet:'tplSnippet',run:'tplRun'};
  $('#mainContent').html($('#'+tplMap[page]).html());
  if(element) element.render();
  if(form) form.render();
  if(page=='scripts') loadScripts();
  if(page=='upload') setTimeout(initUpload,200);
  if(page=='snippet') initSnippet();
  if(page=='run') setTimeout(initRun,300);
}

// ═══ Scripts ═══
function loadScripts(){
  $.get('/api/scripts', function(res){
    table.render({
      elem:'#scriptTable', data:res, page:false, height:'full-80',
      cols:[[
        {field:'id',title:'ID',width:50},
        {field:'name',title:'脚本名称',width:110},
        {field:'parse',title:'解析',width:80,templet:function(d){return '<span class="layui-badge layui-bg-green">'+d.parse+'</span>'}},
        {field:'status',title:'版本',width:70,templet:function(d){
          var cls = d.status=='PUBLISHED'?'layui-bg-blue':'layui-bg-orange';
          return '<span class="layui-badge '+cls+'">'+d.status+'</span>';
        }},
        {field:'ver',title:'V',width:35},
        {field:'rules',title:'规则数',width:65},
        {field:'time',title:'上传时间',width:140},
        {title:'操作',width:210,templet:'#scriptBar'}
      ]]
    });
  });
}

// ═══ Upload ═══
function initUpload(){
  upload.render({
    elem:'#uploadBox', url:'/api/upload', accept:'file', exts:'sps',
    done:function(res){
      if(res.code==0){
        $('#uploadResult').html('<div class="layui-bg-green" style="padding:10px;color:#fff">上传成功! 脚本ID='+res.scriptId
          +', '+res.rules+'条规则, '+res.outputRules+'个输出分组</div>');
      }else{
        $('#uploadResult').html('<div class="layui-bg-red" style="padding:10px;color:#fff">'+res.msg+'</div>');
      }
    },
    error:function(){ $('#uploadResult').html('<div class="layui-bg-red" style="padding:10px;color:#fff">上传失败</div>') }
  });
}

// ═══ Rules ═══
function showRules(){
  $('#scriptTitle').text(currentScriptName+' - 规则列表');
  showPage('rules');
  $.get(RULE_API+'?scriptId='+currentScriptId, function(res){
    table.render({
      elem:'#ruleTable', data:res, page:false, height:'full-80',
      cols:[[
        {field:'correctionEnabled',title:'纠偏',width:80,templet:function(d){return correctionEnabledCell(d);}},
        {field:'correctionType',title:'纠偏类型',width:150,templet:function(d){return htmlEscape(d.correctionType||'')}},
        {field:'correctionVariables',title:'纠偏变量',width:150,templet:function(d){return htmlEscape(d.correctionVariables||'')}},
        {field:'correctionStrategy',title:'纠偏策略',width:260,templet:function(d){return htmlEscape(d.correctionStrategy||'')}},
        {field:'sort',title:'#',width:50},
        {field:'code',title:'编号',width:80},
        {field:'type',title:'类型',width:130,templet:function(d){return '<span class="tag '+d.type+'">'+d.type+'</span>'}},
        {field:'typeLabel',title:'中文描述类型',width:110,templet:function(d){return htmlEscape(d.typeLabel || typeLabel(d.type));}},
        {field:'target',title:'目标变量',width:120,templet:function(d){return htmlEscape(d.target||'')}},
        {field:'sources',title:'源变量',width:180,templet:function(d){return sourceCell(d.sources);}},
        {field:'sourceQuestionMappings',title:'源变量-question_id',width:220,templet:function(d){return questionMappingCell(d.sourceQuestionMappings);}},
        {field:'startLine',title:'起止行',width:105,templet:function(d){return lineRangeCell(d);}},
        {field:'description',title:'规则说明',width:300,templet:function(d){return htmlEscape(d.description||'')}},
        {title:'操作',width:220,templet:'#ruleBar'}
      ]],
      done:function(){
        $('#ruleTable').next('.layui-table-view').addClass('rule-source-question-table');
      }
    });
  });
}

function syncSourceQuestionMappings(){
  if(!currentScriptId){ layer.msg('请选择脚本'); return; }
  $.post(RULE_API+'/sync-source-question-mappings?scriptId='+currentScriptId, function(res){
    if(res && res.code===0){
      layer.msg('已同步 '+(res.updated || 0)+' 条规则');
      showRules();
    }else{
      layer.msg((res && res.msg) || '同步失败');
    }
  }).fail(function(xhr){
    layer.msg('同步失败: '+xhr.status);
  });
}

function showDetail(){
  $.get(RULE_API+'/'+currentRuleId, function(res){
    $('#ruleTitle').text('规则: '+res.name+' ('+res.code+')');
    showPage('detail');
    $('#ruleInfo').html(
      '<div><b>类型:</b> <span class="tag '+res.type+'">'+res.type+'</span>  '+
      '<b>中文类型:</b> '+htmlEscape(res.typeLabel || typeLabel(res.type))+'  '+
      '<b>行号:</b> '+lineRangeCell(res)+'</div>'+
      '<div style="margin-top:6px"><b>目标:</b> '+htmlEscape(res.target||'')+'  <b>源变量:</b> '+sourceCell(res.sources)+'</div>'+
      '<div style="margin-top:6px"><b>源变量-question_id:</b><div class="rule-source-question-lines">'+htmlEscape(res.sourceQuestionMappings||'')+'</div></div>'+
      '<div style="margin-top:6px"><b>纠偏:</b> '+correctionEnabledText(res)+'  '+
      '<b>类型:</b> '+htmlEscape(res.correctionType||'')+'  '+
      '<b>变量:</b> '+htmlEscape(res.correctionVariables||'')+'</div>'+
      '<div style="margin-top:6px"><b>来源:</b> '+htmlEscape(res.correctionSource||'')+'  '+
      '<b>阶段:</b> '+htmlEscape(res.correctionApplyStage||'')+'  '+
      '<b>写clean:</b> '+htmlEscape(String(res.correctionWriteClean || 0))+'  '+
      '<b>写原始表:</b> '+htmlEscape(String(res.correctionWriteSource || 0))+'</div>'+
      '<div style="margin-top:6px"><b>策略:</b> '+htmlEscape(res.correctionStrategy||'')+'</div>'+
      '<div style="margin-top:6px"><b>说明:</b> '+htmlEscape(res.correctionDescription||'')+'</div>'+
      '<div style="margin-top:8px;color:#666">'+htmlEscape(res.description||'')+'</div>'
    );
    var steps = res.steps||[];
    $('#stepCount').text(steps.length);
    var html = '';
    steps.forEach(function(s){
      html += '<div class="step-card '+s.type+'">';
      html += '<span class="tag '+s.type+'">'+s.type+'</span> <b>#'+s.no+'</b> ';
      if(s.condition) html += ' <span style="color:#FF8C00">WHEN: '+htmlEscape(s.condition)+'</span>';
      if(s.source) html += ' 来源='+s.source;
      if(s.target) html += ' →'+s.target;
      if(s.expression) html += ' <code>'+htmlEscape(s.expression)+'</code>';
      html += '</div>';
    });
    $('#stepList').html(html||'<span style="color:#999">无步骤(单一COMPUTE规则)</span>');
    $('#spssSource').text(res.spss||'');
    $('#javaPreview').text(res.java||'');
  });
}

function initSnippet(){

function previewSnippet(){
  var text = $('#snippetText').val().trim();
  if(!text){ layer.msg('请输入SPSS代码'); return; }
  $('#snippetResult').html('<span style="color:#999">解析中...</span>');
  $.ajax({url:'/api/snippet/preview', method:'POST', contentType:'application/json',
    data:JSON.stringify({spsText:text}), success:function(res){
      if(res.code!=0){ $('#previewResult').html('<div style="color:red">'+res.msg+'</div>'); return; }
      var html = '<div style="color:green">共解析出 '+res.totalRules+' 条规则, '+res.totalOutputs+' 个输出分组</div>';
      html += '<table class="layui-table layui-table-sm" style="margin-top:8px"><tr><th>目标变量</th><th>类型</th><th>说明</th></tr>';
      res.rules.forEach(function(r){
        html += '<tr><td>'+htmlEscape(r.target)+'</td><td><span class="tag '+r.type+'">'+r.type+'</span></td><td>'+htmlEscape(r.description||'')+'</td></tr>';
      });
      html += '</table>';
      $('#previewResult').html(html);
      $('#snippetResult').html('');
    }, error:function(){ $('#snippetResult').html(''); }
  });
}

function saveSnippet(){
  var text = $('#snippetText').val().trim();
  if(!text){ layer.msg('请输入SPSS代码'); return; }
  var scriptId = $('#snippetScriptId').val();
  var url = scriptId ? '/api/snippet/append' : '/api/snippet/create';
  var data = scriptId ? {scriptId:parseInt(scriptId), spsText:text} : {name:$('#snippetName').val()||'未命名片段', spsText:text};
  $('#snippetResult').html('<span style="color:#999">保存中...</span>');
  $.ajax({url:url, method:'POST', contentType:'application/json', data:JSON.stringify(data), success:function(res){
    if(res.code==0){
      $('#snippetResult').html('<span style="color:green">'+res.msg+'</span>');
      $('#snippetText').val('');
      $('#previewResult').html('<span style="color:#999">点击"预览解析"查看结果</span>');
    }else{
      $('#snippetResult').html('<span style="color:red">'+res.msg+'</span>');
    }
  }});
}

// ═══ Run Rules ═══
var runMapFile, runStuFile;

function bindRunFileUpload(elem, exts, labelSelector, setter){
  upload.render({
    elem: elem,
    accept: 'file',
    exts: exts,
    auto: false,
    multiple: false,
    choose: function(obj){
      obj.preview(function(index, file){
        setter(file);
        $(labelSelector).text(file && file.name ? file.name : '已选择文件');
      });
    },
    error: function(){ layer.msg('选择文件失败'); }
  });
}

function initRun(){
  $.get('/api/scripts', function(res){
    var html = '<option value="">-- 请选择 --</option>';
    res.forEach(function(s){ html += '<option value="'+s.id+'">#'+s.id+' '+htmlEscape(s.name)+'</option>'; });
    $('#runScriptId').html(html);
    form.render('select');
  });
  loadRegionOptions(null, '#runProvinceId', '省');

  $('#runProvinceId').off('change').on('change', function(){
    onRunProvinceChanged($(this).val());
  });
  $('#runCityId').off('change').on('change', function(){
    onRunCityChanged($(this).val());
  });
  $('#runDivisionId').off('change').on('change', function(){
    loadRunSchools();
  });
  $('#runTableId').off('change').on('change', function(){
    updateRunSchoolVisibility();
    loadRunSchools();
  });
  form.on('select(runProvinceId)', function(data){
    onRunProvinceChanged(data.value);
  });
  form.on('select(runCityId)', function(data){
    onRunCityChanged(data.value);
  });
  form.on('select(runDivisionId)', function(data){
    loadRunSchools();
  });
  form.on('select(runTableId)', function(){
    updateRunSchoolVisibility();
    loadRunSchools();
  });
  updateRunSchoolVisibility();
  bindRunFileUpload('#runMapBtn', 'json|sql', '#runMapName', function(file){ runMapFile = file; });
  bindRunFileUpload('#runStuBtn', 'json', '#runStuName', function(file){ runStuFile = file; });

  $('#runExecuteBtn').off('click').click(function(){
    var scriptId = $('#runScriptId').val();
    var projectId = $('#runProjectId').val();
    var year = $('#runYear').val();
    var tableId = $('#runTableId').val();
    var divisionId = $('#runDivisionId').val();
    var schoolId = $('#runSchoolId').val();
    if(!scriptId){ layer.msg('请选择脚本'); return; }
    if(!projectId){ layer.msg('请输入projectId'); return; }
    if(!year){ layer.msg('请输入年份'); return; }
    if(!tableId){ layer.msg('请选择表'); return; }
    if(!divisionId){ layer.msg('请选择区县'); return; }
    if(needsRunSchool(tableId) && !schoolId){ layer.msg('表2/表3执行必须选择学校'); return; }
    $('#runStatus').html('<span style="color:#999">执行中...</span>');
    var fd = new FormData();
    fd.append('scriptId', scriptId);
    fd.append('projectId', projectId);
    fd.append('year', year);
    fd.append('tableId', tableId);
    fd.append('divisionId', divisionId);
    fd.append('source', $('#runSource').val() || 'normal');
    if(needsRunSchool(tableId)) fd.append('schoolId', schoolId);
    if(runMapFile){ fd.append('mapping', runMapFile, runMapFile.name); fd.append('mappingFile', runMapFile, runMapFile.name); }
    if(runStuFile){ fd.append('student', runStuFile, runStuFile.name); fd.append('studentFile', runStuFile, runStuFile.name); }
    var strictValidate = $('#strictValidate').is(':checked');
    fd.append('strictValidate', strictValidate);
    $.ajax({url:'/api/v2/rules/execute-db', method:'POST', data:fd, processData:false, contentType:false,
      success:function(res){
        renderStudentSplitResult(res.data || res.splitResult || buildSplitFromValidationReport(res.validationReport));
        if(res.code!=0){
          $('#runStatus').html('<span style="color:red">'+htmlEscape(res.msg||'执行失败')+'</span>');
          return;
        }
        var data = res.data || res.splitResult || {};
        $('#runStatus').html('<span style="color:green">完成</span>');
        var meta = res.executionSource === 'db'
          ? '，来源 '+htmlEscape(res.answerTable || '')+'，答案 '+htmlEscape(res.answerCount || 0)
          : '';
        if(data.students){
          $('#runSummary').text('(学生数 '+htmlEscape(data.studentCount || 0)+'，规则数 '+htmlEscape(data.ruleCount || 0)+'，存在未通过学生 '+htmlEscape(data.failedStudentCount || 0)+meta+')');
        } else {
          $('#runSummary').text('(学生数 '+htmlEscape(data.studentCount || 0)+'，通过 '+htmlEscape(data.passedCount || 0)+'，未通过 '+htmlEscape(data.failedCount || 0)+meta+')');
        }
        $('#runErrorDetail').html('');
      },
      error:function(xhr){
        var msg = xhr.responseJSON && xhr.responseJSON.msg ? xhr.responseJSON.msg : (xhr.responseText || '');
        $('#runStatus').html('<span style="color:red">请求失败: '+xhr.status+'</span>');
        if(msg) $('#runErrorDetail').html('<pre style="white-space:pre-wrap;background:#fff5f5;padding:10px;color:#a00;max-height:300px;overflow:auto">'+htmlEscape(msg)+'</pre>');
      }
    });
  });
}

function onRunProvinceChanged(value){
  $('#runCityId').html('<option value="">市</option>');
  $('#runDivisionId').html('<option value="">区县</option>');
  $('#runSchoolId').html('<option value="">-- 请选择学校 --</option>');
  if(value) loadRegionOptions(value, '#runCityId', '市');
  form.render('select');
}

function onRunCityChanged(value){
  $('#runDivisionId').html('<option value="">区县</option>');
  $('#runSchoolId').html('<option value="">-- 请选择学校 --</option>');
  if(value) loadRegionOptions(value, '#runDivisionId', '区县');
  form.render('select');
}

function loadRegionOptions(parentId, selector, label){
  var url = '/api/v2/regions/children' + (parentId ? ('?parentId='+encodeURIComponent(parentId)) : '');
  $.get(url, function(res){
    var html = '<option value="">'+label+'</option>';
    (res.data || []).forEach(function(r){
      html += '<option value="'+htmlEscape(r.id)+'">'+htmlEscape(r.name || r.divisionName || r.id)+'</option>';
    });
    $(selector).html(html);
    form.render('select');
  });
}

function loadRunSchools(){
  var divisionId = $('#runDivisionId').val();
  var tableId = $('#runTableId').val();
  $('#runSchoolId').html('<option value="">-- 请选择学校 --</option>');
  if(!divisionId || !needsRunSchool(tableId)){
    form.render('select');
    return;
  }
  $.get('/api/v2/schools?divisionId='+encodeURIComponent(divisionId)+'&projectId='+encodeURIComponent($('#runProjectId').val() || ''), function(res){
    var html = '<option value="">-- 请选择学校 --</option>';
    (res.data || []).forEach(function(s){
      html += '<option value="'+htmlEscape(s.id)+'">'+htmlEscape(s.name || s.schoolName || s.id)+'</option>';
    });
    $('#runSchoolId').html(html);
    form.render('select');
  });
}

function updateRunSchoolVisibility(){
  var show = needsRunSchool($('#runTableId').val());
  $('#runSchoolRow').toggle(show);
}

function needsRunSchool(tableId){
  return ['3','4','5','6','7','8'].indexOf(String(tableId || '')) >= 0;
}


function renderStudentSplitResult(data){
  data = data || {};
  var rows = data.students || [];
  $('#studentSplitSummary').show().html(
    '<b>学生规则结果</b>：学生数 '+htmlEscape(data.studentCount || rows.length)+
    '，规则数 '+htmlEscape(data.ruleCount || 0)+
    '，全部通过学生 <span style="color:#009688;font-weight:bold">'+htmlEscape(data.passedStudentCount || 0)+'</span>'+
    '，存在未通过学生 <span style="color:#c00;font-weight:bold">'+htmlEscape(data.failedStudentCount || 0)+'</span>'
  );

  $('#passedStudentPanel').show();
  $('#passedStudentPanel h3').text('学生规则结果');
  $('#failedStudentPanel').hide();

  table.render({
    elem:'#passedStudentTable',
    data:rows,
    page:true,
    limit:20,
    limits:[20,50,100,200],
    text:{none:'暂无执行结果'},
    cols:[[
      {field:'studentId',title:'学生ID',width:150,templet:function(d){return htmlEscape(d.studentId || d.studentKey || '');}},
      {field:'studentName',title:'姓名',width:120,templet:function(d){return htmlEscape(d.studentName || '');}},
      {field:'passedText',title:'通过',minWidth:220,templet:function(d){return multilineRuleCell(d.passedText);}},
      {field:'failedText',title:'未通过',minWidth:360,templet:function(d){return multilineRuleCell(d.failedText);}},
      {field:'failedDetailText',title:'详细说明',minWidth:420,templet:function(d){return multilineRuleCell(d.failedDetailText);}}
    ]],
    done:function(){
      $('#passedStudentTable').next('.layui-table-view').addClass('student-rule-result-table');
    }
  });
}

function multilineRuleCell(value){
  return '<div class="student-rule-lines">'+htmlEscape(value || '')+'</div>';
}

function buildSplitFromValidationReport(report){
  if(!report) return {passedList:[], failedList:[], studentCount:0, passedCount:0, failedCount:0, totalRows:0, violationCount:0};
  var byStudent = {};
  var order = [];
  (report.issues || []).forEach(function(i){
    var key = i.studentId || i.sampleKey || ('第'+(i.rowNo||'')+'行');
    if(!byStudent[key]){
      byStudent[key] = {studentId:i.studentId || null, studentKey:i.sampleKey || key, studentName:'', violations:[]};
      order.push(key);
    }
    byStudent[key].violations.push({
      level:i.level,
      ruleCode:i.code,
      ruleName:i.code,
      message:i.message,
      suggestion:i.suggestion,
      lineNo:i.rowNo,
      fieldName:i.fieldName,
      questionId:i.questionId,
      optionId:i.optionId,
      fieldValue:i.fieldValue
    });
  });
  var failed = order.map(function(k){return byStudent[k];});
  return {totalRows:report.totalRows||0, studentCount:failed.length, passedCount:0, failedCount:failed.length, violationCount:report.issueTotal || failed.length, passedList:[], failedList:failed};
}


function typeLabel(type){
  var map = {
    COMPUTE_INTERMEDIATE:'中间计算', IDENTITY_CHECK:'ID校验', DUPLICATE_MARK:'去重标记',
    MISSING_CHECK:'缺失检查', CONSISTENCY_CHECK:'一致性校验', RANGE_CHECK:'范围校验',
    DOCUMENT_CHECK:'证件校验', CONDITIONAL_BLOCK:'条件块', OUTPUT_GROUP:'输出分组',
    OUTCOME_DETERMINATION:'结局判定'
  };
  return map[type] || type || '';
}

function lineRangeCell(d){
  if(!d) return '';
  var s = d.startLine || d.startline || d.start_line;
  var e = d.endLine || d.endline || d.end_line;
  if(!s || !e) return '';
  return s + '-' + e;
}

function sourceCell(s){
  if(!s) return '';
  var parts = String(s).split(',').map(function(x){return $.trim(x);}).filter(function(x){return x.length>0;});
  if(parts.length===0) return '';
  var text = parts.join(', ');
  var show = text.length > 80 ? text.substring(0, 80) + '…' : text;
  return '<span title="'+htmlAttr(text)+'">'+htmlEscape(show)+'</span>';
}

function questionMappingCell(s){
  return '<div class="rule-source-question-lines">'+htmlEscape(s || '')+'</div>';
}

function correctionEnabledCell(d){
  var enabled = String(d && d.correctionEnabled != null ? d.correctionEnabled : '0') === '1';
  return enabled ? '<span class="layui-badge layui-bg-green">是</span>' : '<span style="color:#999">否</span>';
}

function correctionEnabledText(d){
  return String(d && d.correctionEnabled != null ? d.correctionEnabled : '0') === '1' ? '是' : '否';
}

function checkedAttr(value){
  return String(value == null ? '0' : value) === '1' || value === true ? 'checked' : '';
}

function correctionOption(value, label, current){
  return '<option value="'+htmlAttr(value)+'" '+(String(current || '') === String(value || '') ? 'selected' : '')+'>'+htmlEscape(label)+'</option>';
}

function htmlEscape(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function htmlAttr(s){return htmlEscape(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
